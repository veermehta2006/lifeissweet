<!DOCTYPE html>
<html>
<head>
<title>Life is Sweet Kitchen</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#fff7f0;
}

.menu-item{
border:1px solid #ddd;
padding:15px;
margin:10px;
display:inline-block;
width:200px;
background:white;
}

button{
background:#ff6b35;
color:white;
border:none;
padding:10px;
cursor:pointer;
}

#cart{
margin-top:30px;
}

</style>
</head>

<body>

<h1>Life is Sweet</h1>
<p>Homemade food made with love</p>

<h2>Menu</h2>

<div class="menu-item">
<h3>Veg Biryani</h3>
<p>₹150</p>
<button onclick="addItem('Veg Biryani',150)">Add</button>
</div>

<div class="menu-item">
<h3>Paneer Butter Masala</h3>
<p>₹180</p>
<button onclick="addItem('Paneer Butter Masala',180)">Add</button>
</div>

<div class="menu-item">
<h3>Dal Tadka</h3>
<p>₹120</p>
<button onclick="addItem('Dal Tadka',120)">Add</button>
</div>

<div id="cart">
<h2>Your Order</h2>
<ul id="cartItems"></ul>

<button onclick="sendOrder()">Order on WhatsApp</button>
</div>

<script>

let cart=[];

function addItem(name,price){

cart.push({name,price});

let list=document.getElementById("cartItems");

let item=document.createElement("li");

item.innerText=name+" ₹"+price;

list.appendChild(item);

}

function sendOrder(){

let message="Hello, I want to order:%0A";

cart.forEach(item=>{
message+=item.name+" - ₹"+item.price+"%0A";
});

let phone="9820639444";

window.open("https://wa.me/"+phone+"?text="+message);

}

</script>

</body>
</html>
