<!DOCTYPE html>
<html>

<head>

<title>Rù D'Avril</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Playfair Display', serif;
background:#f5efe6;
color:#3d342f;
text-align:center;
}

.logo{
margin-top:40px;
}

.logo img{
max-width:340px;
}

h2{
font-family:'Great Vibes', cursive;

color:#5a4a42;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:40px;
padding-bottom:60px;
}

.product{
background:white;
border-radius:12px;
width:280px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
transition:0.3s;
}

.product:hover{
transform:translateY(-5px);
}

.product img{
width:100%;
border-radius:10px;
}

.product h3{
margin-top:15px;
font-size:18px;
}

.product p{
font-size:16px;
margin-top:5px;
}

button{
margin-top:12px;
background:#c6a98d;
border:none;
padding:10px 18px;
color:white;
font-size:14px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#b69678;
}

</style>

</head>

<body>

<div class="logo">
<img src="logo.png">
</div>

<h2>Boutique Collection</h2>

<div class="products">

<div class="product">

</a>

<img src="second.jpeg">

</a>
</div>

<div class="product">
<img src="third.jpeg">

</div>

<div class="product">

</a>
