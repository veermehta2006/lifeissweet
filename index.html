<!DOCTYPE html>
<html>

<head>

<title>Rù D'Avril</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Playfair Display', serif;
background:#f5efe6;
color:#3d342f;
text-align:center;
}

.logo{
margin-top:35px;
}

.logo img{
max-width:300px;
}

h2{
font-family:'Great Vibes', cursive;
font-size:40px;
margin-top:20px;
margin-bottom:30px;
color:#5a4a42;
}

/* swipe container */

.carousel{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
gap:20px;
padding:20px;
}

.carousel::-webkit-scrollbar{
display:none;
}

.product{
flex:0 0 80%;
max-width:300px;
margin:auto;
background:white;
border-radius:14px;
padding:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.08);
scroll-snap-align:center;
}

.product img{
width:100%;
border-radius:10px;
}

.product h3{
margin-top:15px;
font-size:18px;
}

.product p{
margin-top:5px;
}

button{
margin-top:12px;
background:#c6a98d;
border:none;
padding:10px 18px;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#b69678;
}

</style>

</head>

<body>

<div class="logo">
<img src="logo.png">
</div>

<h2>The Earthen Threads</h2>

<div class="carousel">

<div class="product">
<img src="first.jpeg">
<h3>Desert Ember Kurti</h3>
<p>₹1199</p>
<a href="payment.html">
<button>Buy</button>
</a>
</div>

<div class="product">
<img src="second.jpeg">
<h3>Forest Bloom Dress</h3>
<p>₹1599</p>
<a href="payment.html">
<button>Buy</button>
</a>
</div>

<div class="product">
<img src="third.jpeg">
<h3>Sandstone Co-ord Set</h3>
<p>₹1899</p>
<a href="payment.html">
<button>Buy</button>
</a>
</div>

<div class="product">
<img src="fourth.jpeg">
<h3>Golden Sun Co-ord Set</h3>
<p>₹1699</p>
<a href="payment.html">
<button>Buy</button>
</a>
</div>

<div class="product">
<img src="fifth.jpeg">
<h3>Sage Meadow Set</h3>
<p>₹1499</p>
<a href="payment.html">
<button>Buy</button>
</a>
</div>

<div class="product">
<img src="sixth.jpeg">
<h3>Royal Plum Set</h3>
<p>₹1799</p>
<a href="payment.html">
<button>Buy</button>
</a>
</div>

</div>

</body>

</html>
